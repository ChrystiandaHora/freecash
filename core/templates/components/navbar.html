{% load static %}
<nav 
  id="apple-nav" 
  x-data="{ 
    openFlyout: null, 
    mobileMenu: false,
    navItems: [
      { 
        id: 'geral', 
        label: 'Geral', 
        elevated: { title: 'Explorar Geral', links: [
          { label: 'Dashboard', url: '{% url 'dashboard' %}' },
          { label: 'Relatórios', url: '{% url 'exportar_relatorio' %}' }
        ]},
        groups: [
          { title: 'Ações Rápidas', links: [
            { label: 'Importar Dados', url: '{% url 'importar' %}' },
            { label: 'Exportar Backup', url: '{% url 'exportar' %}' }
          ]}
        ]
      },
      { 
        id: 'financeiro', 
        label: 'Financeiro', 
        elevated: { title: 'Controle', links: [
          { label: 'Contas a Pagar', url: '{% url 'contas_pagar' %}' },
          { label: 'Pipeline Kanban', url: '{% url 'contas_kanban' %}' }
        ]},
        groups: [
          { title: 'Gestão', links: [
            { label: 'Meus Cartões', url: '{% url 'cartoes' %}' },
            { label: 'Receitas', url: '{% url 'receitas' %}' }
          ]}
        ]
      },
      { 
        id: 'investimentos', 
        label: 'Investimentos', 
        elevated: { title: 'Patrimônio', links: [
          { label: 'Dashboard Invest', url: '{% url 'investimento:dashboard' %}' },
          { label: 'Todos os Ativos', url: '{% url 'investimento:ativo_listar' %}' }
        ]},
        groups: [
          { title: 'Gestão de Carteira', links: [
            { label: 'Balanceamento', url: '{% url 'investimento:balanceamento_ativos' %}' },
            { label: 'Classes de Ativos', url: '{% url 'investimento:classe_listar' %}' },
            { label: 'Extrato de Transações', url: '{% url 'investimento:transacao_listar' %}' }
          ]},
          { title: 'Ferramentas', links: [
            { label: 'Atualizar Cotações', url: '{% url 'investimento:atualizar_cotacoes' %}' },
            { label: 'Sincronizar Histórico', url: '{% url 'investimento:atualizar_historico_carteira' %}' }
          ]}
        ]
      }
    ]
  }"
  @mouseleave="openFlyout = null"
  class="fixed top-0 left-0 right-0 z-[100] h-[44px] bg-white/80 dark:bg-zinc-900/80 apple-nav-blur border-b border-black/[0.08] dark:border-white/[0.08] transition-all duration-300"
>
  <div class="max-w-[1024px] mx-auto h-full px-4 flex items-center justify-between">
    
    <a href="{% url 'dashboard' %}" class="opacity-80 hover:opacity-100 transition-opacity">
      <img src="{% static 'freecash/Icon.png' %}" alt="Logo" class="w-[17px] h-[17px]" />
    </a>

    <div class="hidden md:flex items-center gap-8">
      <template x-for="item in navItems" :key="item.id">
        <button 
          @mouseenter="openFlyout = item.id"
          class="apple-nav-link text-[12px] text-zinc-800/80 dark:text-zinc-200/80 hover:text-zinc-950 dark:hover:text-white transition-colors py-2"
          x-text="item.label"
        ></button>
      </template>
    </div>

    <div class="flex items-center gap-6">
      <button id="theme-toggle" class="text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 transition-colors">
        <i id="theme-icon-light" class="fa-solid fa-sun text-[13px] hidden"></i>
        <i id="theme-icon-dark" class="fa-solid fa-moon text-[13px] hidden"></i>
      </button>

      <div class="relative" x-data="{ userOpen: false }">
        <button @click="userOpen = !userOpen" class="w-5 h-5 rounded-full bg-zinc-200 dark:bg-zinc-800 flex items-center justify-center text-[9px] font-bold text-zinc-600 dark:text-zinc-400 border border-black/5 dark:border-white/5">
          {{ request.user.username|slice:":1"|upper }}
        </button>
        <div x-show="userOpen" @click.away="userOpen = false" class="absolute right-0 mt-3 w-40 bg-white dark:bg-zinc-900 rounded-xl border border-black/[0.08] dark:border-white/[0.08] shadow-2xl p-2 py-2">
           <a href="{% url 'logout' %}" class="flex items-center gap-2 px-3 py-1.5 text-[12px] text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors">
             <i class="fa-solid fa-power-off text-[10px]"></i> Sair
           </a>
        </div>
      </div>

      <button @click="mobileMenu = !mobileMenu" class="md:hidden text-zinc-800/80 dark:text-zinc-200/80 hover:text-zinc-950 dark:hover:text-white transition-colors">
        <i class="fa-solid" :class="mobileMenu ? 'fa-xmark' : 'fa-bars'"></i>
      </button>
    </div>
  </div>

  <!-- Flyout -->
  <div 
    x-show="openFlyout" 
    x-transition:enter="transition ease-out duration-350"
    x-transition:enter-start="opacity-0 -translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="absolute top-[44px] left-0 right-0 bg-white dark:bg-[#1d1d1f] border-b border-black/[0.16] dark:border-white/[0.16] shadow-2xl"
    style="display: none;"
  >
    <div class="max-w-[1024px] mx-auto py-12 px-10">
      <div class="flex gap-20">
        <template x-if="openFlyout">
          <div class="flex gap-20 w-full">
            
            <div class="min-w-[200px]">
              <h2 class="text-[11px] text-zinc-400 dark:text-zinc-500 uppercase tracking-widest font-semibold mb-6" x-text="navItems.find(i => i.id === openFlyout).elevated.title"></h2>
              <ul class="space-y-4">
                <template x-for="link in navItems.find(i => i.id === openFlyout).elevated.links" :key="link.url">
                  <li>
                    <a :href="link.url" class="text-2xl font-bold text-zinc-900 dark:text-zinc-100 hover:text-emerald-500 dark:hover:text-emerald-400 transition-colors block leading-tight" x-text="link.label"></a>
                  </li>
                </template>
              </ul>
            </div>

            <div class="flex gap-20">
              <template x-for="group in navItems.find(i => i.id === openFlyout).groups" :key="group.title">
                <div class="min-w-[150px]">
                  <h2 class="text-[11px] text-zinc-400 dark:text-zinc-500 uppercase tracking-widest font-semibold mb-6" x-text="group.title"></h2>
                  <ul class="space-y-3">
                    <template x-for="link in group.links" :key="link.url">
                      <li>
                        <a :href="link.url" class="text-[12px] font-semibold text-zinc-800 dark:text-zinc-200 hover:text-emerald-500 dark:hover:text-emerald-400 transition-colors" x-text="link.label"></a>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>
            </div>

          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div 
    x-show="mobileMenu" 
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="fixed inset-0 top-[44px] bg-white dark:bg-zinc-950 z-[90] p-8 overflow-y-auto"
    style="display: none;"
  >
    <nav class="space-y-12">
      <template x-for="item in navItems" :key="item.id">
        <div>
          <h3 class="text-[11px] font-black uppercase tracking-widest text-zinc-400 mb-6" x-text="item.label"></h3>
          <div class="space-y-6">
             <template x-for="link in [...item.elevated.links, ...item.groups.flatMap(g => g.links)]" :key="link.url">
              <a :href="link.url" class="block text-3xl font-bold text-zinc-900 dark:text-zinc-200 hover:text-emerald-500 transition-colors">
                <span x-text="link.label"></span>
              </a>
            </template>
          </div>
        </div>
      </template>
    </nav>
  </div>
</nav>
