services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: freecash/postgres:1.0
    container_name: freecash_postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
      build:
        context: .
        dockerfile: Dockerfile.web
      image: freecash/django:1.0
      container_name: freecash_web
      restart: unless-stopped

      env_file:
        - .env

      ports:
        - "8000:8000"

      volumes:
        - .:/app
        - node_modules:/app/node_modules

      depends_on:
        postgres:
          condition: service_healthy

      command: >
        sh -c "
        npm install &&
        npm run build:css &&
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
        "

volumes:
  postgres_data:
  node_modules:
