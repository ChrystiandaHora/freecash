services:
  postgres:
    build:
      context: ./backend
      dockerfile: Dockerfile.postgres
    image: freecash/postgres:1.0
    container_name: freecash_postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile.backend
      image: freecash/backend:1.0
      container_name: freecash_backend
      restart: unless-stopped

      env_file:
        - .env

      ports:
        - "${BACKEND_PORT:-8000}:8000"

      environment:
        - FRONTEND_PORT=${FRONTEND_PORT:-5173}

      volumes:
        - ./backend:/app

      depends_on:
        postgres:
          condition: service_healthy

      command: >
        sh -c "
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
        "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: development
    image: freecash/frontend:1.0
    container_name: freecash_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:

